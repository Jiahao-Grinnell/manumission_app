services:
  ollama_seed:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_NO_CLOUD: "1"
      HOME: /home/ollama
    user: "10001:10001"
    volumes:
      - ./volumes/ollama:/home/ollama/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: "no"
    profiles:
      - seed
